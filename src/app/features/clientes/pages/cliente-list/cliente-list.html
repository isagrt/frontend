<section class="page">
  <div class="page-header">
    <h2>Clientes</h2>
    <button class="new" (click)="newCliente()">Novo cliente</button>
  </div>

  <div *ngIf="loading">Carregando...</div>
  <div class="table-wrapper" *ngIf="!loading">
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Endereço</th>
          <th>Ações</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let cliente of clientes">
          <td>{{ cliente.id }}</td>
          <td>{{ cliente.name }}</td>
          <td>{{ cliente.phone }}</td>
          <td>{{ cliente.endereco }}</td>
          <td class="actions">
            <button class="edit" (click)="editCliente(cliente.id!)">Editar</button>
            <button class="delete" (click)="deleteCliente(cliente.id!)">Excluir</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
